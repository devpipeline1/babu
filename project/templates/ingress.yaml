apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Values.env }}
  name: {{ .Values.metadata.name }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: "myfirst-web.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.metadata.name }}
            port:
              number: 80