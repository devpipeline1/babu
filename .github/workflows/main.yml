# CICD using GitHub actions
name: BabuCI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'project/**'
      - 'README.md'

jobs:

  # Stage 1: Code Scanning (CodeQL)
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript # change to your language (e.g., python, go, java)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # Stage 2: Image Scanning (Trivy)
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: codeql-analysis
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image (no push)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: testimage:latest

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: testimage:latest
        format: table
        exit-code: 1
        ignore-unfixed: true

  # Stage 3: Build & Push Docker image
  build:
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

  # Stage 4: Update Helm chart with new tag
  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in Helm chart
      run: |
        sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' project/values.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "devpipelinepulse@gmail.com"
        git config --global user.name "devpipeline1"
        git add project/values.yaml
        git commit -m "Update tag in Helm chart"
        git push
